<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Speech → Image (Lokal)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #101214; color: #E6E6E6; }
    header { padding: 12px 16px; background: #1C1F22; border-bottom: 1px solid #2A2F34; display: flex; align-items: center; justify-content: space-between; }
    header .title { font-weight: 700; }
    main { display: grid; grid-template-columns: 320px 1fr; gap: 16px; padding: 16px; }
    @media (max-width: 920px) { main { grid-template-columns: 1fr; } }
    section { background: #15181B; border: 1px solid #2A2F34; border-radius: 10px; padding: 12px; }
    h3 { margin: 8px 0 12px; font-size: 16px; color: #C8D1DA; }
    label { display: block; margin: 10px 0 6px; color: #A9B3BC; font-size: 13px; }
    input[type="text"], textarea, select, input[type="number"] {
      width: 100%; padding: 10px; background: #0F1214; color: #E6E6E6; border: 1px solid #2A2F34; border-radius: 8px; font-size: 14px;
    }
    textarea { min-height: 80px; resize: vertical; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button {
      background: #2B7FFF; color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-weight: 600;
    }
    button.secondary { background: #2A2F34; color: #D6E2F0; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .pill { font-size: 12px; padding: 6px 10px; border-radius: 999px; background: #22262B; color: #C8D1DA; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .img-card { background: #0F1214; border: 1px solid #2A2F34; border-radius: 8px; overflow: hidden; }
    .img-card img { display: block; width: 100%; height: auto; background: #0A0C0E; }
    .meta { padding: 8px; font-size: 12px; color: #A9B3BC; }
    .log { background: #0F1214; color: #C8D1DA; border: 1px solid #2A2F34; border-radius: 8px; padding: 8px; height: 180px; overflow: auto; font-size: 12px; white-space: pre-wrap; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; background: #1E7B36; color: #DFF6E6; font-size: 11px; }
    .badge.warn { background: #7B5E1E; color: #FFF1D1; }
    .badge.err { background: #7B1E1E; color: #FFD6D6; }
    .sp { height: 10px; }
  </style>
</head>
<body>
<header>
  <div class="title">Lokale Sprach-zu-Bild Pipeline</div>
  <div class="row">
    <button id="btnStart">Start</button>
    <button id="btnStop" class="secondary">Stop</button>
    <span id="status" class="pill">init…</span>
  </div>
</header>

<main>
  <section id="left">
    <h3>Style-Prompt</h3>
    <label for="stylePrompt">Beschreibe den gewünschten Stil (z. B. „cinematisch, warmes Gegenlicht, 85mm“)</label>
    <textarea id="stylePrompt" placeholder="Dein Style-Text…"></textarea>
    <div class="row">
      <button id="btnSaveStyle">Style speichern</button>
      <span id="styleSaved" class="badge" style="display:none;">gespeichert</span>
    </div>

    <div class="sp"></div>
    <h3>Bild-Upload (als Style-Referenz)</h3>
    <label for="fileRef">Optionales Bild hochladen (inspiriert den Stil)</label>
    <input type="file" id="fileRef" accept="image/*" />
    <div class="row">
      <button id="btnUploadRef">Hochladen</button>
      <span id="refInfo" class="pill">keine Referenz</span>
    </div>

    <div class="sp"></div>
    <h3>Direkt generieren</h3>
    <label for="directPrompt">Thema/Motiv (wird mit Style kombiniert)</label>
    <input type="text" id="directPrompt" placeholder="z. B. Ein Fuchs im Wald bei Sonnenaufgang" />
    <div class="row">
      <button id="btnDirectGen">Bild generieren</button>
    </div>

    <div class="sp"></div>
    <h3>Plan (LLM → Prompt → Bild)</h3>
    <label for="planText">Freitext (LLM erzeugt einen kompakten Bild-Prompt)</label>
    <input type="text" id="planText" placeholder="z. B. Eine futuristische Stadt bei Nacht" />
    <div class="row">
      <button id="btnPlan">Plan & Bild</button>
      <span id="lastLLMPrompt" class="pill">—</span>
    </div>

    <div class="sp"></div>
    <h3>Transkription & System</h3>
    <div class="log" id="log"></div>
  </section>

  <section id="right">
    <h3>Generierte Bilder</h3>
    <div id="gallery" class="grid"></div>
  </section>
</main>

<script>
(function(){
  const $ = (sel) => document.querySelector(sel);

  const statusEl = $('#status');
  const logEl = $('#log');
  const gallery = $('#gallery');

  const stylePromptEl = $('#stylePrompt');
  const btnSaveStyle = $('#btnSaveStyle');
  const styleSaved = $('#styleSaved');

  const fileRef = $('#fileRef');
  const btnUploadRef = $('#btnUploadRef');
  const refInfo = $('#refInfo');

  const directPrompt = $('#directPrompt');
  const btnDirectGen = $('#btnDirectGen');

  const planText = $('#planText');
  const btnPlan = $('#btnPlan');
  const lastLLMPrompt = $('#lastLLMPrompt');

  const btnStart = $('#btnStart');
  const btnStop = $('#btnStop');

  function appendLog(line, cls){
    const time = new Date().toLocaleTimeString();
    const span = document.createElement('div');
    span.textContent = '[' + time + '] ' + line;
    if (cls) span.className = cls;
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
  }

  async function fetchJSON(url, opts) {
    const res = await fetch(url, opts || {});
    if (!res.ok) {
      const t = await res.text().catch(()=>'');
      throw new Error(url + ' ' + res.status + ' ' + t);
    }
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) return res.json();
    return {};
  }

  async function loadConfig() {
    try {
      const cfg = await fetchJSON('/config');
      // Style: style_details → UI
      stylePromptEl.value = cfg.style?.style_details || '';
      // Referenz-Info
      if (cfg.style?.use_reference && cfg.style?.reference_id) {
        refInfo.textContent = 'Referenz aktiv ('+cfg.style.reference_id.slice(0,8)+'…)';
      } else {
        refInfo.textContent = 'keine Referenz';
      }
      statusEl.textContent = 'bereit';
      appendLog('Konfiguration geladen.');
    } catch (e) {
      statusEl.textContent = 'Fehler';
      appendLog('Config Fehler: ' + e.message, 'err');
    }
  }

  // SSE verbinden
  function connectSSE() {
    const ev = new EventSource('/events');
    ev.addEventListener('status', (e) => {
      const msg = e.data || '';
      if (msg === 'hb') return;
      appendLog('Status: ' + msg);
      if (msg.startsWith('audio_device:')) statusEl.textContent = 'Mic OK';
      if (msg === 'audio_stream_started') statusEl.textContent = 'Aufnahme';
      if (msg === 'audio_stopped' || msg === 'audio_stream_stopped') statusEl.textContent = 'Gestoppt';
      if (msg === 'llm_ok') lastLLMPrompt.className = 'pill';
    });
    ev.addEventListener('transcript', (e) => {
      appendLog('ASR: ' + (e.data || ''));
    });
    ev.addEventListener('llm_prompt', (e) => {
      const p = e.data || '';
      lastLLMPrompt.textContent = p ? (p.length > 48 ? p.slice(0,48)+'…' : p) : '—';
      lastLLMPrompt.className = 'pill';
      appendLog('LLM Prompt: ' + p);
    });
    ev.addEventListener('image', (e) => {
      const rel = e.data || '';
      if (!rel) return;
      const url = '/static/' + rel.replace(/^\/+/, '');
      const card = document.createElement('div');
      card.className = 'img-card';
      const img = document.createElement('img');
      img.src = url;
      img.alt = rel;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = rel;
      card.appendChild(img);
      card.appendChild(meta);
      gallery.prepend(card);
      appendLog('Bild generiert: ' + rel, 'ok');
    });
    ev.onerror = () => {
      appendLog('SSE Verbindung unterbrochen…', 'warn');
    };
  }

  // Buttons
  btnStart.addEventListener('click', async () => {
    try {
      const res = await fetch('/start', { method: 'POST' });
      if (!res.ok) throw new Error('Start fehlgeschlagen');
      statusEl.textContent = 'Aufnahme';
      appendLog('Audioaufnahme gestartet.');
    } catch (e) {
      appendLog(e.message, 'err');
    }
  });
  btnStop.addEventListener('click', async () => {
    try {
      const res = await fetch('/stop', { method: 'POST' });
      if (!res.ok) throw new Error('Stop fehlgeschlagen');
      statusEl.textContent = 'Gestoppt';
      appendLog('Audioaufnahme gestoppt.');
    } catch (e) {
      appendLog(e.message, 'err');
    }
  });

  btnSaveStyle.addEventListener('click', async () => {
    const styleText = (stylePromptEl.value || '').trim();
    try {
      const payload = {
        style_preset: '',            // unverändert
        style_details: styleText,    // wichtig
        negative_base: '',           // unverändert
        color_scheme: '',            // unverändert
        use_reference: undefined,    // nicht überschreiben
        reference_id: undefined,     // nicht überschreiben
        reference_strength: undefined
      };
      // Nur die gesetzten Felder senden
      const clean = {};
      for (const [k,v] of Object.entries(payload)) {
        if (v !== undefined && v !== null) clean[k] = v;
      }
      await fetchJSON('/api/settings/style', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(clean)
      });
      styleSaved.style.display = 'inline-block';
      setTimeout(()=> styleSaved.style.display='none', 1200);
      appendLog('Style-Prompt gespeichert.');
    } catch (e) {
      appendLog('Style speichern: ' + e.message, 'err');
    }
  });

  btnUploadRef.addEventListener('click', async () => {
    const f = fileRef.files && fileRef.files[0];
    if (!f) { appendLog('Bitte eine Bilddatei wählen.', 'warn'); return; }
    const fd = new FormData();
    fd.append('file', f, f.name);
    try {
      const res = await fetch('/api/reference/upload', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error((data && data.error) ? data.error : 'Upload fehlgeschlagen');
      }
      // Backend setzt use_reference=true und reference_id
      // Aktualisiere Anzeige
      const sty = await fetchJSON('/api/settings/style');
      if (sty.use_reference && sty.reference_id) {
        refInfo.textContent = 'Referenz aktiv ('+String(sty.reference_id).slice(0,8)+'…)';
      } else {
        refInfo.textContent = 'keine Referenz';
      }
      appendLog('Referenzbild hochgeladen und aktiviert.');
    } catch (e) {
      appendLog('Upload: ' + e.message, 'err');
    }
  });

  btnDirectGen.addEventListener('click', async () => {
    const topic = (directPrompt.value || '').trim();
    if (!topic) { appendLog('Bitte ein Motiv eingeben.', 'warn'); return; }
    try {
      const body = { prompt: topic };
      const data = await fetchJSON('/api/image/direct', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
      // Bild wird zusätzlich via SSE „image“ gesendet; hier fallback:
      if (data && data.relpath) {
        const rel = data.relpath;
        const url = '/static/' + rel.replace(/^\/+/, '');
        const card = document.createElement('div'); card.className='img-card';
        const img = document.createElement('img'); img.src=url; img.alt=rel;
        const meta = document.createElement('div'); meta.className='meta'; meta.textContent=rel;
        card.appendChild(img); card.appendChild(meta); gallery.prepend(card);
        appendLog('Direkt generiert: ' + rel);
      }
    } catch (e) {
      appendLog('Direct: ' + e.message, 'err');
    }
  });

  btnPlan.addEventListener('click', async () => {
    const txt = (planText.value || '').trim();
    if (!txt) { appendLog('Bitte einen Plan-Text eingeben.', 'warn'); return; }
    try {
      const body = { text: txt, tags: [] };
      const data = await fetchJSON('/api/plan', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(body)
      });
      if (data && data.prompt) {
        lastLLMPrompt.textContent = data.prompt.length > 48 ? (data.prompt.slice(0,48)+'…') : data.prompt;
        appendLog('Plan erstellt, Prompt: ' + data.prompt);
      } else {
        appendLog('Plan erstellt.', 'ok');
      }
    } catch (e) {
      appendLog('Plan: ' + e.message, 'err');
    }
  });

  // Init
  connectSSE();
  loadConfig();
})();
</script>
</body>
</html>
